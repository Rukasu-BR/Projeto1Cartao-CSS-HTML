<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ui design Cartão de Crédito</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" >
        <header>
            <span class="logo">
                <img src="images/images/logo.png" alt="">
                <h5>Master Card</h5>
            </span>
            <img src="images/images/chip.png" alt="" class="chip">
        </header>
        <div class="card-details">
            <div class="name-number">
                <h6>Número do cartão</h6>
                <h5 class="number">8050 5040 2030 3020</h5>
                <h6 class="name">Lucas Santos Silva</h6>
            </div>
            <div class="valid-date">
                <h6>Valido até</h6>
                <h5>05/32</h5>
            </div>
        </div>
    </div>
</body>
</html>
